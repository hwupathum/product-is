name: Integration Test Runner FIPS

on:
  workflow_dispatch:

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Set up Adopt JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "adopt"
      - name: Build IS pack without Integration Tests
        run: |
          mvn clean install --batch-mode -Dmaven.test.skip=true | tee mvn-build.log
      - name: Configure FIPS and repackage IS distribution
        working-directory: modules/distribution/target
        run: |
          IS_ZIP=$(find . -maxdepth 1 -name "wso2is-*.zip" | head -1)
          IS_PACK_NAME=$(basename "$IS_ZIP" .zip)
          echo "Unzipping $IS_ZIP"
          unzip -q "$IS_ZIP"
          IS_PACK="$IS_PACK_NAME"
          echo "Adding FIPS configuration to $IS_PACK/repository/conf/deployment.toml"
          cat >> "$IS_PACK/repository/conf/deployment.toml" << 'EOF'

          [jce_provider]
          provider_name = "BC"
          EOF
          echo "Running fips.sh on $IS_PACK"
          CARBON_HOME="$(pwd)/$IS_PACK_NAME" bash "$IS_PACK/bin/fips.sh"
          echo "Repackaging $IS_PACK_NAME"
          rm -f "$IS_ZIP"
          zip -r "$IS_ZIP" "$IS_PACK_NAME/"
      - name: Run Integration Tests with FIPS (JDK 21)
        working-directory: modules/integration/tests-integration/tests-backend
        run: |
          mvn clean install -Dmaven.test.failure.ignore=false | tee mvn-test.log

          PR_TEST_STATUS=$(cat mvn-test.log | grep "\[INFO\] BUILD" | grep -oE '[^ ]+$')
          PR_TEST_RESULT=$(sed -n -e '/\[INFO\] Results:/,/\[INFO\] Tests run:/ p' mvn-test.log)

          PR_BUILD_FINAL_RESULT=$(
            echo "==========================================================="
            echo "product-is FIPS TESTS $PR_TEST_STATUS"
            echo "=========================================================="
            echo ""
            echo "$PR_TEST_RESULT"
          )

          PR_BUILD_RESULT_LOG_TEMP=$(echo "$PR_BUILD_FINAL_RESULT" | sed 's/$/%0A/')
          PR_BUILD_RESULT_LOG=$(echo $PR_BUILD_RESULT_LOG_TEMP)
          echo "::warning::$PR_BUILD_RESULT_LOG"

          PR_TEST_SUCCESS_COUNT=$(grep -o -i "\[INFO\] BUILD SUCCESS" mvn-test.log | wc -l)
          if [ "$PR_TEST_SUCCESS_COUNT" != "17" ]; then
            echo "Integration tests not successful. Aborting."
            echo "::error::Integration tests not successful. Check artifacts for logs."
            exit 1
          fi

          echo ""
          echo "=========================================================="
          echo "Build completed"
          echo "=========================================================="
          echo ""
      - name: Archive mvn build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-is-fips-mvn-build-log
          path: |
            modules/integration/tests-integration/tests-backend/mvn-test.log
          if-no-files-found: warn
      - name: Archive surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-is-fips-surefire-report
          path: |
            modules/integration/tests-integration/tests-backend/**/surefire-reports
          if-no-files-found: warn
